name: Test & Lint

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

jobs:
    test:
        name: Test
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v3
            - uses: pnpm/action-setup@v3
              with:
                  version: 11.5.1
            - uses: actions/setup-node@v3
              with:
                  node-version: 24.x
            - name: Install
              run: pnpm install
            - name: Audit
              run: pnpm audit --audit-level=high
            - name: Build
              run: pnpm run build
            - name: Test
              run: pnpm run test
            - name: Lint
              run: pnpm run lint
            - name: TypeScript Check
              run: pnpm run check
            - name: Format Check
              run: pnpm run format:check
